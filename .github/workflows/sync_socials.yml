# Sync new YouTube videos (RSS) to socials.
#
# Two modes (set repo variable SOCIAL_OUTPUT_MODE, or pass in env):
#   - meta: direct Meta Graph API (needs FACEBOOK_* / INSTAGRAM_* secrets).
#   - webhook: POST JSON to Pipedream/Make/etc. (needs WEBHOOK_URLS) — no Meta app on your side.

name: Sync social posts

on:
  workflow_dispatch:
  schedule:
    # Every 6 hours UTC; adjust as needed
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-socials
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run social automator
        env:
          SOCIAL_OUTPUT_MODE: ${{ vars.SOCIAL_OUTPUT_MODE }}
          YOUTUBE_CHANNEL_ID_ARTISTS: ${{ secrets.YOUTUBE_CHANNEL_ID_ARTISTS }}
          YOUTUBE_CHANNEL_ID_BEATS: ${{ secrets.YOUTUBE_CHANNEL_ID_BEATS }}
          WEBHOOK_URLS: ${{ secrets.WEBHOOK_URLS }}
          WEBHOOK_BEARER_TOKEN: ${{ secrets.WEBHOOK_BEARER_TOKEN }}
          FACEBOOK_PAGE_ID_1: ${{ secrets.FACEBOOK_PAGE_ID_1 }}
          FACEBOOK_PAGE_ID_2: ${{ secrets.FACEBOOK_PAGE_ID_2 }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ACCESS_TOKEN_1: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN_1 }}
          FACEBOOK_PAGE_ACCESS_TOKEN_2: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN_2 }}
          INSTAGRAM_FACEBOOK_PAGE_ID: ${{ secrets.INSTAGRAM_FACEBOOK_PAGE_ID }}
          INSTAGRAM_PAGE_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_PAGE_ACCESS_TOKEN }}
          META_GRAPH_API_VERSION: ${{ vars.META_GRAPH_API_VERSION }}
        run: python scripts/social_automator.py

      - name: Commit updated publish history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/published_history.json
          if git diff --staged --quiet; then
            echo "No history changes to commit."
          else
            git commit -m "chore: update social publish history"
            git push
          fi
